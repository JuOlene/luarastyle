<!DOCTYPE html> 
<html lang="pt-br"> <!--Idioma do site, sempre em inglês por ser a o idioma mais coumum, para mudar so trocar a inicial do idioma-->
<head>
    <meta charset="UTF-8"> <!--codificação que sabe todos os idiomas-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuaraStyle</title> <!-- titulo quee aparece na abertura da página -->
    
    <!-- Bootstrap Icons -->
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- CSS -->
     <link rel="stylesheet" href="css/estilo.css">


</head> <!--`código de abertura-->
<body>  
    <!-- ALT + SHIFT + A gerar comentario -->

    <!-- Cabeçalho, topo, area superior do site -->  
    <header>

     <!-- Logo -->
     <div class="header-logo"> 
        
      <a href="#home">
      <img src="img/luara logo.png" alt="" class="logo">
      </a>
     </div>
     <!-- Menu Desktop / PC -->
      <nav class="menu-desktop">
        <ul class="menu">
            <li>
                <!-- Cria links -->
                <a href="#home" class="menu-link active"> 
                    <span class="menu-texto"> Home</span>
                </a>
            </li>

            <li>
                 <a href="#tenis" class="menu-link active"> 
                    <span class="menu-texto"> Tênis</span>
                    </span>
                </a>
            </li>

            <li>
                <a href="#Combinações" class="menu-link">
                    <span class="menu-texto">Combinações</span>
                </a>
            </li>

            <li>
                <a href="#Contato" class="menu-link"> 
                    <span class="menu-texto"> Contato </span>
                </a>
            </li>
        </ul>
                                        
      </nav>
      <!--Icone trocar cor e tema  -->
      <div class="header-toggle">
     
        <!-- Icone Sol e Lua -->
        <i class="bi bi-sun" id="toggleTheme"></i>

        <!-- Botão hamburguer  -->
         <button class="btn-menu-mobile" id="menuHamburguer">
            <i class="bi bi-list"></i>
         </button>
       

      </div>

    </header>
 


</body>
</html> <!--`código de fechamento-->
